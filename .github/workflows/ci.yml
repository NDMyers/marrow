name: CI

on:
  push:
    branches: [main, master, alpha]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test
      - run: cargo clippy -- -D warnings

  perf-smoke:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: perf-harness synthetic fixture + thresholds
        run: |
          set -euo pipefail
          FIX=$(mktemp -d)
          trap 'rm -rf "$FIX"' EXIT
          printf '%s\n' 'def helper():' '    pass' > "$FIX/lib.py"
          printf '%s\n' 'def main():' '    helper()' > "$FIX/caller.py"
          ./target/release/marrow perf-harness --root "$FIX" --repo-id ci-smoke --fresh --json > "$FIX/out.json"
          export HJSON="$FIX/out.json"
          python3 -c "import json, pathlib, os, sys; h=json.load(open(os.environ['HJSON'])); t=json.load(open('ci/perf-thresholds.json')); ing=h.get('ingest_wall_ms'); q=h.get('query_wall_ms'); \
          assert ing is not None and q is not None, h; \
          assert ing <= t['ingest_wall_ms_max'], (ing, t['ingest_wall_ms_max']); \
          assert q <= t['query_wall_ms_max'], (q, t['query_wall_ms_max']); \
          print('perf-smoke ok ingest_ms=', ing, 'query_ms=', q)"
