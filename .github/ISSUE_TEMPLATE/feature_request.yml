name: "✨ Feature Request"
description: "Suggest a new feature or improvement"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thank you for the feature suggestion! Help us understand your use case."

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "What problem are you trying to solve? What's the pain point?"
      placeholder: |
        Currently, when I try to [use case], I have to [workaround].
        It would be better if [desired outcome].
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "How would you like this feature to work?"
      placeholder: "Add a command like: marrow feature-name --option value"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any other approaches you've thought about? (optional)"
      placeholder: "Alternative 1: ...\nAlternative 2: ..."

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any other relevant information? (optional)"
      placeholder: "Links to related issues, similar tools, references..."
